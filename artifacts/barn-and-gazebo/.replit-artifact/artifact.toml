kind = "web"
previewPath = "/"
title = "The Barn and Gazebo"
version = "1.0.0"
id = "artifacts/barn-and-gazebo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19230

[services.development]
run = "pnpm --filter @workspace/barn-and-gazebo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barn-and-gazebo", "run", "build" ]
publicDir = "artifacts/barn-and-gazebo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19230"
BASE_PATH = "/"
